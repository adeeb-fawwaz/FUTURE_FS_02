<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Future Interns | Mini CRM Dashboard</title>
  <!-- Load React & Babel directly for clean, compilation-free execution -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Beautiful Typography & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: #f8fafc; color: #1e293b; padding: 40px 5%; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; pb-4; border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; }
    h1 { font-size: 1.75rem; color: #0f172a; font-weight: 700; }
    .badge { background: #e0f2fe; color: #0369a1; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    
    .grid-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 32px; }
    @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }
    
    /* Card Styles */
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
    .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: #334155; }
    
    /* Form inputs */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; color: #64748b; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; outline: none; transition: border 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: #2563eb; }
    
    button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; font-size: 0.95rem; transition: background 0.2s; }
    button:hover { background: #1d4ed8; }
    
    /* Lead Items/Table styling */
    .lead-list { display: flex; flex-direction: column; gap: 14px; }
    .lead-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 18px; display: flex; flex-direction: column; gap: 12px; transition: transform 0.2s; }
    .lead-item:hover { transform: translateY(-2px); border-color: #cbd5e1; }
    .lead-row-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .lead-name { font-weight: 600; font-size: 1.05rem; color: #0f172a; }
    .lead-email { font-size: 0.85rem; color: #64748b; margin-top: 2px; }
    
    /* Status pills */
    .status-pill { font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 12px; text-transform: uppercase; }
    .status-New { background: #fef3c7; color: #d97706; }
    .status-Contacted { background: #dbeafe; color: #2563eb; }
    .status-Converted { background: #dcfce7; color: #15803d; }
    
    .actions-bar { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    .btn-sm { width: auto; padding: 6px 12px; font-size: 0.8rem; background: #f1f5f9; color: #475569; }
    .btn-sm:hover { background: #e2e8f0; }
    .btn-delete { background: #fef2f2; color: #dc2626; margin-left: auto; }
    .btn-delete:hover { background: #fee2e2; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [leads, setLeads] = useState([]);
      const [formData, setFormData] = useState({ name: '', email: '', source: 'Website Form', notes: '' });
      const API_URL = '/api/leads';

      // Fetch leads from backend
      const fetchLeads = async () => {
        try {
          const res = await fetch(API_URL);
          const data = await res.json();
          setLeads(data);
        } catch (err) {
          console.error("Error fetching data:", err);
        }
      };

      useEffect(() => {
        fetchLeads();
      }, []);

      // Handle Form Submit
      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.name || !formData.email) return alert("Please fill out Name and Email!");
        
        try {
          await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
          });
          setFormData({ name: '', email: '', source: 'Website Form', notes: '' });
          fetchLeads(); // Refresh list
        } catch (err) {
          console.error(err);
        }
      };

      // Update Status
      const updateStatus = async (id, newStatus) => {
        try {
          await fetch(`${API_URL}/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus })
          });
          fetchLeads();
        } catch (err) {
          console.error(err);
        }
      };

      // Delete Lead
      const deleteLead = async (id) => {
        if(!confirm("Are you sure you want to remove this client lead?")) return;
        try {
          await fetch(`${`/${API_URL}/${id}`.replace('//', '/')}`, { method: 'DELETE' });
          fetchLeads();
        } catch (err) {
          console.error(err);
        }
      };

      return (
        <div>
          <header>
            <div>
              <h1>Client Lead Management System</h1>
              <p style={{ color: '#64748b', fontSize: '0.9rem', marginTop: '4px' }}>Track, capture, and convert your incoming business leads.</p>
            </div>
            <span className="badge">Track Code: FS</span>
          </header>

          <div className="grid-layout">
            {/* LEFT COLUMN: Add Lead Form */}
            <div className="card">
              <h2 className="card-title">Capture New Lead</h2>
              <form onSubmit={handleSubmit}>
                <div className="form-group">
                  <label>Full Name</label>
                  <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="John Doe" />
                </div>
                <div className="form-group">
                  <label>Email Address</label>
                  <input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} placeholder="john@example.com" />
                </div>
                <div className="form-group">
                  <label>Lead Source</label>
                  <select value={formData.source} onChange={e => setFormData({...formData, source: e.target.value})}>
                    <option value="Website Form">Website Form</option>
                    <option value="LinkedIn Inbound">LinkedIn Inbound</option>
                    <option value="Referral">Referral</option>
                    <option value="Cold Outreach">Cold Outreach</option>
                  </select>
                </div>
                <div className="form-group">
                  <label>Initial Interaction Notes</label>
                  <textarea rows="3" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} placeholder="Interested in custom software design services..."></textarea>
                </div>
                <button type="submit">Add Lead to Database</button>
              </form>
            </div>

            {/* RIGHT COLUMN: Active Dashboard Board */}
            <div className="card">
              <h2 className="card-title">Active Database Pipeline ({leads.length} Leads)</h2>
              <div className="lead-list">
                {leads.length === 0 ? (
                  <p style={{ textAlign: 'center', color: '#94a3b8', padding: '40px 0' }}>No active leads currently found in database.</p>
                ) : (
                  leads.map(lead => (
                    <div className="lead-item" key={lead._id}>
                      <div className="lead-row-top">
                        <div>
                          <div className="lead-name">{lead.name}</div>
                          <div className="lead-email">{lead.email} · <span style={{ fontWeight: '600' }}>{lead.source}</span></div>
                        </div>
                        <span className={`status-pill status-${lead.status}`}>{lead.status}</span>
                      </div>
                      
                      {lead.notes && (
                        <p style={{ fontSize: '0.88rem', color: '#475569', background: '#f8fafc', padding: '10px', borderRadius: '6px', borderLeft: '3px solid #cbd5e1' }}>
                          <strong>Notes:</strong> {lead.notes}
                        </p>
                      )}

                      <div className="actions-bar">
                        <span style={{ fontSize: '0.8rem', color: '#94a3b8', marginRight: '4px' }}>Move status:</span>
                        <button className="btn-sm" onClick={() => updateStatus(lead._id, 'New')}>New</button>
                        <button className="btn-sm" onClick={() => updateStatus(lead._id, 'Contacted')}>Contacted</button>
                        <button className="btn-sm" onClick={() => updateStatus(lead._id, 'Converted')}>Converted</button>
                        <button className="btn-sm btn-delete" onClick={() => deleteLead(lead._id)}>🗑 Remove</button>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
